<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Проверка снимка</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap");

    * { box-sizing: border-box; }
    :root {
      --bg-0: #070b16;
      --bg-1: #10182d;
      --bg-2: #1a2946;
      --surface: rgba(14, 20, 37, 0.82);
      --surface-2: #111b33;
      --line: rgba(151, 181, 255, 0.26);
      --text: #eaf1ff;
      --muted: #9fb1d3;
      --accent: #4ec9ff;
      --accent-2: #00f0c5;
      --danger: #ff7c96;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.38);
    }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Manrope", "Segoe UI", sans-serif;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(140% 100% at 6% -10%, #1f3058 0%, transparent 40%),
        radial-gradient(100% 80% at 95% 0%, #0f5661 0%, transparent 36%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 60%, #04070f 100%);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.35;
      z-index: -1;
    }
    .controls {
      flex: 0 0 auto;
      padding: 1rem 1.25rem 0.9rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 18, 34, 0.9), rgba(12, 18, 34, 0.7));
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
      animation: fadeSlide 0.45s ease-out;
    }
    .controls-inner {
      max-width: 48rem;
    }
    .controls-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(16rem, 1fr);
      gap: 1rem;
      align-items: start;
    }
    .form-pane {
      min-width: 0;
    }
    .title {
      margin: 0 0 0.75rem;
      font-size: clamp(1.25rem, 2vw, 1.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 0 24px rgba(78, 201, 255, 0.35);
    }
    button, select, input[type="file"] {
      font: inherit;
      color: inherit;
      cursor: pointer;
    }
    select, input[type="file"] {
      background: rgba(11, 18, 34, 0.85);
      border: 1px solid var(--line);
      border-radius: 0.65rem;
      padding: 0.42rem 0.7rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }
    input[type="file"] {
      padding: 0.28rem 0.45rem;
      color: var(--muted);
    }
    input[type="file"]::file-selector-button,
    input[type="file"]::-webkit-file-upload-button {
      border: 0;
      padding: 0.48rem 0.75rem;
      margin-right: 0.65rem;
      border-radius: 0.6rem;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #041223;
      background: linear-gradient(120deg, var(--accent) 0%, var(--accent-2) 100%);
      box-shadow: 0 6px 18px rgba(0, 240, 197, 0.22);
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease;
    }
    input[type="file"]:hover::file-selector-button,
    input[type="file"]:hover::-webkit-file-upload-button {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }
    select:focus, input[type="file"]:focus {
      outline: 2px solid rgba(78, 201, 255, 0.55);
      outline-offset: 1px;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .primary-btn {
      border: 0;
      padding: 0.6rem 0.95rem;
      border-radius: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #041223;
      background: linear-gradient(120deg, var(--accent) 0%, var(--accent-2) 100%);
      box-shadow: 0 6px 18px rgba(0, 240, 197, 0.25);
      transition: transform 0.16s ease, filter 0.16s ease;
    }
    .primary-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1rem;
      margin-bottom: 0.6rem;
    }
    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    #err {
      color: var(--danger);
      margin-top: 0.75rem;
      font-weight: 600;
    }
    #results {
      display: none;
      padding: 0.9rem 1rem;
      border: 1px solid var(--line);
      border-radius: 0.9rem;
      background: radial-gradient(130% 150% at 20% 0%, rgba(78, 201, 255, 0.2), rgba(8, 14, 28, 0.82));
      min-height: 100%;
    }
    #results.show { display: block; }
    .result-title {
      margin: 0 0 0.55rem;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    .result-line {
      margin: 0.2rem 0;
      font-size: 1.02rem;
    }
    .result-line strong {
      color: #d8e6ff;
    }
    .result-value {
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #f3f8ff;
      text-shadow: 0 0 16px rgba(78, 201, 255, 0.25);
      vertical-align: baseline;
      margin-left: 0.35rem;
    }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .imgs-row {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      min-height: 0;
      background: transparent;
      width: 100%;
      padding: 1rem;
    }
    .img-cell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 0.95rem;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeSlide 0.5s ease-out;
    }
    .img-cell .caption {
      flex: 0 0 auto;
      padding: 0.45rem 0.7rem;
      font-size: 0.86rem;
      color: #cdd9f3;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(78, 201, 255, 0.14), rgba(0, 240, 197, 0.1));
      font-weight: 700;
    }
    .img-cell .frame {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      background: radial-gradient(120% 100% at 50% 0%, rgba(26, 41, 70, 0.5), rgba(6, 10, 20, 0.9));
    }
    .img-cell img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      vertical-align: middle;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.35));
    }
    .img-cell img[hidden] { display: none; }
    .placeholder {
      color: #8ea2c9;
      font-size: 0.9rem;
      text-align: center;
      padding: 1rem;
    }
    .img-cell.empty .frame .placeholder { display: block; }
    .img-cell:not(.empty) .frame .placeholder { display: none; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .controls-layout {
        grid-template-columns: 1fr;
      }
      .imgs-row {
        grid-template-columns: 1fr;
        padding-top: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="controls">
    <div class="controls-inner">
      <div class="controls-layout">
        <div class="form-pane">
          <h1 class="title">Проверка опухоли</h1>
          <div class="row">
            <label for="plane">Плоскость</label>
            <select id="plane" title="Анатомическая плоскость снимка (как при обучении моделей)">
              <option value="ax">ax (аксиальная)</option>
              <option value="sa">sa (сагиттальная)</option>
              <option value="co">co (корональная)</option>
            </select>
          </div>
          <div class="row">
            <label for="f">Изображение</label>
            <input type="file" id="f" accept="image/*" />
          </div>
          <p class="result-line" style="margin-top: 0.55rem;">
            <button class="primary-btn" type="button" id="btn" disabled>Проверить опухоль</button>
          </p>
          <p id="err" hidden></p>
        </div>
        <div id="results" aria-live="polite">
          <p class="result-title">Результат анализа</p>
          <p class="result-line"><strong>Класс:</strong> <span class="result-value" id="cls"></span></p>
          <p class="result-line"><strong>Плоскость:</strong> <span class="result-value" id="pl"></span></p>
        </div>
      </div>
    </div>
  </div>
  <div class="imgs-row" aria-label="Превью и результат">
    <div class="img-cell empty" id="cell1">
      <div class="caption">Исходное изображение</div>
      <div class="frame">
        <span class="placeholder">Выберите файл — изображение появится здесь</span>
        <img id="im1" alt="Исходное изображение" hidden />
      </div>
    </div>
    <div class="img-cell empty" id="cell2">
      <div class="caption">Подсветка области</div>
      <div class="frame">
        <span class="placeholder">Нажмите «Проверить опухоль»</span>
        <img id="im2" alt="С подсветкой" hidden />
      </div>
    </div>
  </div>
  <script>
    const f = document.getElementById("f");
    const planeSel = document.getElementById("plane");
    const btn = document.getElementById("btn");
    const err = document.getElementById("err");
    const results = document.getElementById("results");
    const im1 = document.getElementById("im1");
    const im2 = document.getElementById("im2");
    const cell1 = document.getElementById("cell1");
    const cell2 = document.getElementById("cell2");

    let previewUrl = null;

    function setPreviewFromFile(file) {
      if (previewUrl) {
        URL.revokeObjectURL(previewUrl);
        previewUrl = null;
      }
      im2.removeAttribute("src");
      im2.hidden = true;
      cell2.classList.add("empty");
      results.classList.remove("show");

      if (!file) {
        im1.removeAttribute("src");
        im1.hidden = true;
        cell1.classList.add("empty");
        return;
      }
      previewUrl = URL.createObjectURL(file);
      im1.src = previewUrl;
      im1.hidden = false;
      cell1.classList.remove("empty");
    }

    f.addEventListener("change", () => {
      err.hidden = true;
      const file = f.files && f.files[0];
      btn.disabled = !file;
      setPreviewFromFile(file || null);
    });

    async function parseError(res) {
      let msg = res.status + " " + res.statusText;
      try {
        const j = await res.json();
        if (typeof j.detail === "string") msg = j.detail;
        else if (Array.isArray(j.detail))
          msg = j.detail.map((x) => x.msg || JSON.stringify(x)).join("; ");
      } catch (_) {}
      return msg;
    }

    btn.addEventListener("click", async () => {
      const file = f.files && f.files[0];
      if (!file) {
        err.textContent = "Сначала выберите изображение.";
        err.hidden = false;
        return;
      }

      err.hidden = true;
      results.classList.remove("show");
      btn.disabled = true;

      const fd = new FormData();
      fd.append("file", file);
      fd.append("plane", planeSel.value);

      try {
        const res = await fetch("/predict", { method: "POST", body: fd });
        if (!res.ok) {
          err.textContent = await parseError(res);
          err.hidden = false;
          return;
        }
        const data = await res.json();
        document.getElementById("cls").textContent = data.predicted_class;
        document.getElementById("pl").textContent = data.plane;
        im2.src = "data:image/png;base64," + data.image_overlay_b64;
        im2.hidden = false;
        cell2.classList.remove("empty");
        results.classList.add("show");
      } catch (e) {
        err.textContent = String(e.message || e);
        err.hidden = false;
      } finally {
        btn.disabled = !f.files || !f.files[0];
      }
    });
  </script>
</body>
</html>
